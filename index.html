<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Pandarinka Docs</title>
  <link rel="icon" type="image/png" href="assets/icons/pandarinka-site-icon.png">
  <link rel="apple-touch-icon" href="assets/icons/pandarinka-site-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --theme-color: #ff8a2a;
      --base-background-color: #1d1714;
      --sidebar-background: #15100e;
      --sidebar-border-color: #35241b;
      --heading-color: #ffffff;
      --base-color: #f1e3d8;
      --link-color: #ffb15c;
      --code-theme-background: #120d0b;
      --code-inline-background: #34241b;
      --blockquote-background: #120d0b;
      --blockquote-border-color: #ff8a2a;
      --sidebar-name-color: #ff9b3d;
      --sidebar-nav-link-color: #f1e3d8;
      --sidebar-nav-link-color--active: #ffffff;
      --sidebar-nav-link-border-color--active: #ff8a2a;
      --table-row-odd-background: #211812;
      --table-row-even-background: #18110e;
    }

    body {
      letter-spacing: 0;
    }

    .markdown-section {
      max-width: 920px;
    }

    .markdown-section h1 {
      font-size: 2.25rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 2rem;
    }

    .markdown-section h2 {
      border-bottom: 1px solid #3d2a20;
      padding-bottom: 0.35rem;
      margin-top: 2.25rem;
    }

    .markdown-section blockquote {
      border-radius: 4px;
      padding: 1rem 1.25rem;
    }

    .markdown-section table {
      display: table;
      width: 100%;
    }

    .markdown-section > ul > li > ul {
      margin-bottom: 0.35rem;
      margin-top: 0.25rem;
      padding-left: 1.4rem;
    }

    .markdown-section .program-link {
      color: #c96f2d;
    }

    .markdown-section th,
    .markdown-section td {
      border-color: #3d2a20;
    }

    .sidebar-nav strong,
    .markdown-section strong {
      color: #ffd0a0;
    }

    .video-preview {
      aspect-ratio: 16 / 9;
      margin: 1.4rem 0 1.8rem;
      max-width: 820px;
      width: 100%;
    }

    .video-preview iframe {
      border: 0;
      border-radius: 6px;
      display: block;
      height: 100%;
      width: 100%;
    }

    .guide-video-block {
      margin: 1.4rem 0 1.9rem;
      max-width: 820px;
      width: 100%;
    }

    .guide-video-block video {
      background: #120d0b;
      border: 1px solid #3d2a20;
      border-radius: 6px;
      display: block;
      width: 100%;
    }

    .video-chapters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .video-chapter-link {
      background: transparent;
      border: 1px solid #6a3b20;
      border-radius: 4px;
      color: #ffd0a0;
      cursor: pointer;
      font: inherit;
      padding: 0.32rem 0.55rem;
    }

    .video-chapter-link:hover,
    .video-chapter-link:focus {
      border-color: #ff8a2a;
      color: #ffffff;
      outline: none;
    }

    .video-quality-note {
      color: #bfa99b;
      font-size: 0.95rem;
      margin: 0.65rem 0 0;
    }

    .video-content-note {
      color: #ffd0a0;
      font-size: 0.95rem;
      margin: 0.7rem 0 0;
    }

    .guide-image {
      margin: 1.35rem 0 1.75rem;
      text-align: center;
    }

    .guide-image img {
      border-radius: 6px;
      display: inline-block;
      height: auto;
      max-width: 100%;
    }

    .search {
      display: none;
    }

    .sidebar-nav > ul > li > ul {
      display: none;
    }

    .sidebar-nav > ul > li.sidebar-group-opened > ul {
      display: block;
    }

    .sidebar-nav {
      overflow-x: hidden;
    }

    .sidebar-nav a {
      line-height: 1.28;
      overflow-wrap: anywhere;
      white-space: normal;
      word-break: normal;
    }

    .sidebar-nav .app-sub-sidebar,
    .sidebar-nav .app-sub-sidebar li {
      max-width: 100%;
      min-width: 0;
    }

    .sidebar-nav .app-sub-sidebar a,
    .sidebar-nav a.section-link {
      display: block;
      max-width: 100%;
      overflow: visible !important;
      overflow-wrap: break-word;
      text-overflow: clip !important;
      white-space: normal !important;
    }

    .sidebar-nav li.has-collapsible-group > p {
      border-bottom: 1px solid transparent;
      color: var(--sidebar-nav-link-color);
      cursor: pointer;
      display: inline-block;
      line-height: 1.35;
      margin-bottom: 0.35rem;
      padding-bottom: 0.12rem;
      user-select: none;
    }

    .sidebar-nav li.has-collapsible-group > p:hover,
    .sidebar-nav li.has-collapsible-group > p:focus-visible {
      border-bottom-color: currentColor;
      color: var(--link-color);
      outline: none;
    }

    .sidebar-nav li.has-collapsible-group.sidebar-group-opened > p {
      border-bottom-color: var(--theme-color);
      color: var(--theme-color);
    }

    .sidebar-nav li.has-collapsible-group > p::before {
      content: none;
    }

    .sidebar-nav > ul > li.has-collapsible-group > p {
      color: #ff9b3d;
      font-weight: 800;
    }

    .sidebar-nav > ul > li > ul > li.has-collapsible-group > p {
      color: #ffd0a0;
      font-size: 0.94rem;
      font-weight: 800;
      margin-top: 0.55rem;
      text-transform: uppercase;
    }

    .sidebar-nav > ul > li > ul > li.has-collapsible-group.sidebar-group-opened > p {
      color: #ffb15c;
    }

    .sidebar-nav > ul > li > ul > li:has(> ul) {
      color: #ffb15c;
    }

    .sidebar-subgroup-link {
      color: #ffb15c !important;
      cursor: pointer;
    }

    .sidebar-nav > ul > li > ul > li > a[href="#/toolkit-options"] {
      color: #ffb15c;
    }

    .sidebar-nav > ul > li > ul > li > a[href="#/pandarinka-toolkit"] {
      color: #ffb15c;
    }

    .sidebar-nav > ul > li > ul > li > ul {
      border-left: 1px solid #3d2a20;
      display: none;
      margin-left: 0.35rem;
      padding-left: 0.7rem;
    }

    .sidebar-nav > ul > li > ul > li.sidebar-subgroup-opened > ul {
      display: block;
    }

    .sidebar-nav > ul > li > p.active > a,
    .sidebar-nav > ul > li.active > a {
      border-bottom: 1px solid var(--theme-color);
      color: var(--theme-color) !important;
      display: inline-block;
      padding-bottom: 0.12rem;
    }

    .sidebar-nav a.active,
    .sidebar-nav li.active > a {
      box-sizing: border-box;
      color: #ff8a2a !important;
      display: block;
      max-width: 100%;
      width: 100%;
    }

    .social-links {
      align-items: center;
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 28px 0 16px;
      padding: 0 18px;
    }

    .social-link {
      align-items: center;
      display: flex;
      height: 44px;
      justify-content: center;
      transition: transform 160ms ease;
      width: 44px;
    }

    .social-link:hover,
    .social-link:focus-visible {
      transform: translateY(-1px);
    }

    .social-link img {
      display: block;
      filter: brightness(0.55) saturate(0.75);
      height: 44px;
      width: 44px;
    }

    @media (max-width: 768px) {
      .social-links {
        gap: 8px;
        margin: 24px 0 14px;
        padding: 0 14px;
      }

      .social-link {
        height: 40px;
        width: 40px;
      }

      .social-link img {
        height: 40px;
        width: 40px;
      }
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <div class="social-links" aria-label="Social links">
    <a class="social-link" href="https://discord.com/invite/Ndzqjv8awk" target="_blank" rel="noopener" aria-label="Discord">
      <img src="assets/icons/discord-round-color-icon.png" alt="">
    </a>
    <a class="social-link" href="https://www.patreon.com/Pandarinka" target="_blank" rel="noopener" aria-label="Patreon">
      <img src="assets/icons/patreon_logo_icon_147253.png" alt="">
    </a>
  </div>
  <script>
    (function () {
      var docsBuild = "20260517-toolkit-video-content-note-1";
      var shouldBustDocsCache = true;
      var nativeOpen = XMLHttpRequest.prototype.open;

      XMLHttpRequest.prototype.open = function (method, url) {
        if (shouldBustDocsCache &&
            method === "GET" &&
            typeof url === "string" &&
            /\.md($|\?)/.test(url) &&
            url.indexOf("v=") === -1) {
          url += (url.indexOf("?") === -1 ? "?" : "&") + "v=" + docsBuild;
        }

        var args = Array.prototype.slice.call(arguments);
        args[1] = url;
        return nativeOpen.apply(this, args);
      };
    })();

    document.addEventListener("click", function (event) {
      var chapter = event.target.closest("[data-video-time]");
      if (!chapter) {
        return;
      }

      var block = chapter.closest(".guide-video-block");
      var video = block && block.querySelector("video");
      if (!video) {
        return;
      }

      event.preventDefault();
      video.currentTime = Number(chapter.getAttribute("data-video-time")) || 0;
      video.play();
    }, true);

    (function () {
      var scrollSpyQueued = false;
      var lastPageRoute = null;
      var pendingTopScroll = false;

      function currentRoute() {
        var hash = window.location.hash || "#/";
        var queryIndex = hash.indexOf("?id=");
        return queryIndex >= 0 ? hash.slice(0, queryIndex) : hash;
      }

      function findSidebarLink(route, id) {
        var links = document.querySelectorAll(".sidebar-nav a[href]");
        for (var i = 0; i < links.length; i += 1) {
          var href = links[i].getAttribute("href") || "";
          var decodedHref = decodeURIComponent(href);
          if (decodedHref.indexOf(route + "?id=") === 0 && decodedHref.indexOf("?id=" + id) !== -1) {
            return links[i];
          }
        }
        return null;
      }

      function setActiveSection(link) {
        var route = currentRoute();
        var links = document.querySelectorAll(".sidebar-nav a[href]");
        for (var i = 0; i < links.length; i += 1) {
          var href = decodeURIComponent(links[i].getAttribute("href") || "");
          if (href === route || href.indexOf(route + "?id=") === 0) {
            links[i].classList.remove("active");
            if (links[i].parentElement) {
              links[i].parentElement.classList.remove("active");
            }
          }
        }

        if (!link) {
          return;
        }

        link.classList.add("active");
        if (link.parentElement) {
          link.parentElement.classList.add("active");
        }
      }

      function updateScrollSpy() {
        scrollSpyQueued = false;

        var headings = Array.prototype.slice.call(
          document.querySelectorAll(".markdown-section h2[id], .markdown-section h3[id]")
        );
        if (!headings.length) {
          return;
        }

        var activeHeading = headings[0];
        var triggerLine = Math.min(window.innerHeight * 0.48, 380);
        var isAtBottom = window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 8;

        if (isAtBottom) {
          activeHeading = headings[headings.length - 1];
        } else {
          for (var i = 0; i < headings.length; i += 1) {
            if (headings[i].getBoundingClientRect().top <= triggerLine) {
              activeHeading = headings[i];
            } else {
              break;
            }
          }
        }

        setActiveSection(findSidebarLink(currentRoute(), activeHeading.id));
      }

      function scrollPageToTop() {
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        if (document.body) {
          document.body.scrollTop = 0;
        }

        var content = document.querySelector(".content");
        if (content) {
          content.scrollTop = 0;
        }

        var main = document.querySelector("main");
        if (main) {
          main.scrollTop = 0;
        }
      }

      function finishPendingTopScroll() {
        if (!pendingTopScroll) {
          return;
        }

        pendingTopScroll = false;
        scrollPageToTop();
        window.requestAnimationFrame(scrollPageToTop);
      }

      function queueScrollSpyUpdate() {
        if (scrollSpyQueued) {
          return;
        }
        scrollSpyQueued = true;
        window.requestAnimationFrame(updateScrollSpy);
      }

      function getDirectChild(parent, tagName) {
        var children = parent.children || [];
        for (var i = 0; i < children.length; i += 1) {
          if (children[i].tagName && children[i].tagName.toLowerCase() === tagName) {
            return children[i];
          }
        }
        return null;
      }

      function normalizeSidebarRoute(href) {
        href = decodeURIComponent(href || "");
        var queryIndex = href.indexOf("?id=");
        return queryIndex >= 0 ? href.slice(0, queryIndex) : href;
      }

      function getGroupFirstHref(groupList) {
        var link = groupList ? groupList.querySelector("a[href]") : null;
        return link ? link.getAttribute("href") : "";
      }

      function groupContainsCurrentRoute(groupList, route) {
        if (!groupList) {
          return false;
        }

        var links = groupList.querySelectorAll("a[href]");
        for (var i = 0; i < links.length; i += 1) {
          if (normalizeSidebarRoute(links[i].getAttribute("href")) === route) {
            return true;
          }
        }

        return false;
      }

      function setOnlyOpenSidebarGroup(openItem) {
        var rootList = document.querySelector(".sidebar-nav > ul");
        if (!rootList) {
          return;
        }

        var items = rootList.children || [];
        for (var i = 0; i < items.length; i += 1) {
          var item = items[i];
          if (!item || !item.classList || !item.classList.contains("has-collapsible-group")) {
            continue;
          }

          var label = getDirectChild(item, "p");
          var shouldOpen = item === openItem;
          item.classList.toggle("sidebar-group-opened", shouldOpen);
          item.classList.toggle("sidebar-group-collapsed", !shouldOpen);
          if (label) {
            label.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
          }
        }
      }

      function decorateSidebarGroups() {
        var rootList = document.querySelector(".sidebar-nav > ul");
        if (!rootList) {
          return;
        }

        moveSocialLinksIntoSidebar();
        decorateToolkitSubgroupLinks();

        var route = currentRoute();
        var items = rootList.children || [];
        for (var i = 0; i < items.length; i += 1) {
          var item = items[i];
          if (!item || item.tagName.toLowerCase() !== "li") {
            continue;
          }

          var groupList = getDirectChild(item, "ul");
          var label = getDirectChild(item, "p");
          if (!groupList || !label) {
            continue;
          }

          item.classList.add("has-collapsible-group");

          if (label.getAttribute("data-collapsible-ready") !== "true") {
            label.setAttribute("data-collapsible-ready", "true");
            label.setAttribute("role", "link");
            label.setAttribute("tabindex", "0");
            label.addEventListener("click", function () {
              var parentItem = this.parentElement;
              var groupList = getDirectChild(parentItem, "ul");
              var href = getGroupFirstHref(groupList);

              setOnlyOpenSidebarGroup(parentItem);

              if (href && normalizeSidebarRoute(href) !== currentRoute()) {
                pendingTopScroll = true;
                scrollPageToTop();
                window.location.hash = href;
              } else {
                scrollPageToTop();
              }
            });
            label.addEventListener("keydown", function (event) {
              if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                var parentItem = this.parentElement;
                var groupList = getDirectChild(parentItem, "ul");
                var href = getGroupFirstHref(groupList);

                setOnlyOpenSidebarGroup(parentItem);

                if (href && normalizeSidebarRoute(href) !== currentRoute()) {
                  pendingTopScroll = true;
                  scrollPageToTop();
                  window.location.hash = href;
                } else {
                  scrollPageToTop();
                }
              }
            });
          }

          if (groupContainsCurrentRoute(groupList, route)) {
            item.classList.remove("sidebar-group-collapsed");
            item.classList.add("sidebar-group-opened");
            label.setAttribute("aria-expanded", "true");
          } else {
            item.classList.add("sidebar-group-collapsed");
            item.classList.remove("sidebar-group-opened");
            label.setAttribute("aria-expanded", "false");
          }
        }
      }

      function decorateToolkitSubgroupLinks() {
        var items = document.querySelectorAll(".sidebar-nav > ul > li > ul > li");
        for (var i = 0; i < items.length; i += 1) {
          var item = items[i];
          var groupList = getDirectChild(item, "ul");
          if (!groupList || getDirectChild(item, "a") || item.querySelector(".sidebar-subgroup-link")) {
            continue;
          }

          var firstLink = groupList.querySelector("a[href]");
          if (!firstLink) {
            continue;
          }

          var children = Array.prototype.slice.call(item.childNodes || []);
          var labelText = "";
          for (var j = 0; j < children.length; j += 1) {
            if (children[j].nodeType === Node.TEXT_NODE) {
              labelText += children[j].textContent || "";
              item.removeChild(children[j]);
            }
          }

          labelText = labelText.trim();
          if (!labelText) {
            continue;
          }

          var link = document.createElement("a");
          link.className = "sidebar-subgroup-link";
          link.href = firstLink.getAttribute("href");
          link.textContent = labelText;
          item.insertBefore(link, groupList);
        }

        updateToolkitSubgroupState();
      }

      function updateToolkitSubgroupState() {
        var route = currentRoute();
        var items = document.querySelectorAll(".sidebar-nav > ul > li > ul > li");
        for (var i = 0; i < items.length; i += 1) {
          var item = items[i];
          var groupList = getDirectChild(item, "ul");
          if (!groupList) {
            continue;
          }

          item.classList.toggle("sidebar-subgroup-opened", groupContainsCurrentRoute(groupList, route));
        }
      }

      function moveSocialLinksIntoSidebar() {
        var sidebar = document.querySelector(".sidebar");
        var socialLinks = document.querySelector(".social-links");
        if (!sidebar || !socialLinks || socialLinks.parentElement === sidebar) {
          return;
        }

        sidebar.appendChild(socialLinks);
      }

      window.pandarinkaDocsUpdateScrollSpy = updateScrollSpy;
      window.pandarinkaDocsDecorateSidebarGroups = decorateSidebarGroups;
      window.pandarinkaDocsFinishPendingTopScroll = finishPendingTopScroll;
      window.pandarinkaDocsScrollPageToTop = scrollPageToTop;
      lastPageRoute = currentRoute();
      window.addEventListener("scroll", queueScrollSpyUpdate, { passive: true });
      window.addEventListener("resize", queueScrollSpyUpdate);
      window.addEventListener("hashchange", function () {
        var route = currentRoute();
        if (lastPageRoute !== null && route !== lastPageRoute) {
          pendingTopScroll = true;
          scrollPageToTop();
        }

        lastPageRoute = route;
        decorateSidebarGroups();
        finishPendingTopScroll();
        window.requestAnimationFrame(function () {
          decorateSidebarGroups();
          updateScrollSpy();
          finishPendingTopScroll();
        });
      });
    })();

    window.$docsify = {
      name: "Pandarinka Docs",
      repo: "",
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 3,
      plugins: [
        function (hook) {
          hook.beforeEach(function (content) {
            var route = window.location.hash || "#/";
            var queryIndex = route.indexOf("?id=");
            route = queryIndex >= 0 ? route.slice(0, queryIndex) : route;

            if (window.pandarinkaDocsLastBeforeEachRoute &&
                window.pandarinkaDocsLastBeforeEachRoute !== route) {
              window.pandarinkaDocsPendingRouteTop = true;
            }

            window.pandarinkaDocsLastBeforeEachRoute = route;
            return content;
          });

          hook.doneEach(function () {
            if (window.pandarinkaDocsPendingRouteTop) {
              window.pandarinkaDocsPendingRouteTop = false;
              window.pandarinkaDocsScrollPageToTop();
            }

            window.pandarinkaDocsDecorateSidebarGroups();
            window.pandarinkaDocsFinishPendingTopScroll();
            window.requestAnimationFrame(function () {
              window.pandarinkaDocsDecorateSidebarGroups();
              window.pandarinkaDocsUpdateScrollSpy();
              window.pandarinkaDocsFinishPendingTopScroll();
            });
          });
        }
      ],
      search: {
        maxAge: 86400000,
        paths: "auto",
        placeholder: "Search",
        noData: "No results"
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
</body>
</html>
